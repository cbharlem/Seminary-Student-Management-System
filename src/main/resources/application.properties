# ============================================================
# Student Management System - Application Properties
# St. Francis de Sales Major Seminary
# ============================================================

# Server
server.port=8080

# DataSource - MySQL via phpMyAdmin (localhost)
# SECURITY: Credentials are read from environment variables. Never hardcode passwords here.
# Set these in your OS environment or in a .env file (never commit .env to git):
#   DB_USERNAME=root
#   DB_PASSWORD=your_strong_password_here
spring.datasource.url=jdbc:mysql://localhost:3306/dbstudentmanagementsystem?useSSL=false&serverTimezone=Asia/Manila&tinyInt1isBit=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# File Upload (for document attachments)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Document storage path (change to your preferred local folder)
sms.documents.upload-dir=./uploads/documents

# Jackson - use ISO-8601 date strings (not arrays) for LocalDate / LocalDateTime
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Security — Session & Cookie
# SECURITY (A07): Expire idle sessions after 30 minutes
server.servlet.session.timeout=30m
# SECURITY (A05): Secure cookie flags
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Logging
logging.level.com.seminary.sms=INFO
logging.level.org.springframework.security=WARN
# SECURITY (A05): Suppress ProviderManager logs that expose valid usernames on failed login
logging.level.org.springframework.security.authentication.ProviderManager=ERROR
